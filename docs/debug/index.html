<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f5f5f7" />
    <title>Balance Ladder Debug</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.165.0/build/three.module.js"
        }
      }
    </script>
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Balance Ladder</p>
          <h1>调试助手</h1>
        </div>
        <span id="connectionBadge" class="badge badge-off">未连接</span>
      </header>

      <section class="metric-grid" aria-label="实时遥测">
        <article class="metric-card">
          <span>状态</span>
          <strong id="stateValue">--</strong>
        </article>
        <article class="metric-card">
          <span>角度</span>
          <strong id="angleValue">--</strong>
        </article>
        <article class="metric-card">
          <span>目标</span>
          <strong id="targetValue">--</strong>
        </article>
        <article class="metric-card">
          <span>误差</span>
          <strong id="errorValue">--</strong>
        </article>
        <article class="metric-card">
          <span>角速度</span>
          <strong id="gyroValue">--</strong>
        </article>
        <article class="metric-card">
          <span>电机</span>
          <strong id="cmdValue">--</strong>
        </article>
      </section>

      <section class="main-grid">
        <section class="panel visual-panel">
          <div class="panel-head">
            <div>
              <h2>姿态</h2>
              <p id="telemetryHint">等待遥测数据</p>
            </div>
            <button id="zeroViewBtn" class="ghost-btn" type="button">校准视图</button>
          </div>

          <div class="scene-wrap">
            <div id="scene" class="scene" aria-label="正方体姿态预览"></div>
            <div class="axis-legend" aria-label="坐标轴颜色">
              <span><i class="axis-dot axis-x"></i>X</span>
              <span><i class="axis-dot axis-y"></i>Y</span>
              <span><i class="axis-dot axis-z"></i>Z</span>
            </div>
          </div>

          <div class="chart-head">
            <span>误差 / 电机输出</span>
            <span class="chart-legend"><i class="line-error"></i>error <i class="line-cmd"></i>cmd</span>
          </div>
          <canvas id="plot" class="plot" width="900" height="220"></canvas>
        </section>

        <aside class="side-stack">
          <section class="panel">
            <div class="panel-head">
              <h2>连接</h2>
            </div>

            <div class="tabs" role="tablist">
              <button id="bleTab" class="tab active" type="button">BLE</button>
              <button id="wifiTab" class="tab" type="button">WiFi</button>
            </div>

            <div id="blePane" class="tab-pane active">
              <div class="button-row">
                <button id="bleScanBtn" class="primary-btn" type="button">搜索蓝牙设备</button>
                <button id="bleConnectBtn" class="secondary-btn" type="button" disabled>连接选中设备</button>
              </div>
              <div id="bleDeviceList" class="device-list" role="listbox" aria-label="已选择的蓝牙设备">
                <p class="device-empty">未选择设备。点击“搜索蓝牙设备”，在浏览器弹出的列表中选择要连接的设备。</p>
              </div>
              <button id="bleDisconnectBtn" class="secondary-btn" type="button" disabled>断开</button>
              <p class="note">搜索会打开浏览器蓝牙选择器；页面会保存已授权过的设备，建议使用 Android Chrome 或 Edge。</p>
            </div>

            <div id="wifiPane" class="tab-pane">
              <label class="field">
                <span>WebSocket</span>
                <input id="wsUrl" value="ws://192.168.4.1/ws" autocomplete="off" />
              </label>
              <div class="button-row">
                <button id="wifiConnectBtn" class="primary-btn" type="button">连接</button>
                <button id="wifiDisconnectBtn" class="secondary-btn" type="button" disabled>断开</button>
              </div>
              <label class="field">
                <span>HTTP 命令</span>
                <input id="httpUrl" value="http://192.168.4.1/cmd" autocomplete="off" />
              </label>
              <p class="note">GitHub Pages 下普通 HTTP/WS 可能被浏览器拦截。</p>
            </div>
          </section>

          <section class="panel">
            <div class="panel-head">
              <h2>快捷控制</h2>
            </div>
            <div class="quick-grid">
              <button data-command="status" type="button">status</button>
              <button data-command="defaults" type="button">defaults</button>
              <button data-command="level" type="button">level</button>
              <button data-command="arm" type="button">arm</button>
              <button data-command="stop" type="button">stop</button>
              <button data-command="fault_clear" type="button">clear</button>
              <button data-command="cal" type="button">cal</button>
              <button data-command="auto_on" type="button">auto on</button>
              <button data-command="auto_off" type="button">auto off</button>
            </div>
          </section>

          <section class="panel">
            <div class="panel-head">
              <h2>参数</h2>
            </div>
            <div class="param-grid">
              <label><span>target</span><input id="targetInput" type="number" step="0.1" value="270" /></label>
              <label><span>kp</span><input id="kpInput" type="number" step="0.001" value="0.02" /></label>
              <label><span>ki</span><input id="kiInput" type="number" step="0.001" value="0" /></label>
              <label><span>kd</span><input id="kdInput" type="number" step="0.001" value="0.004" /></label>
              <label><span>limit</span><input id="limitInput" type="number" step="0.05" value="1" /></label>
              <label><span>min_cmd</span><input id="minCmdInput" type="number" step="0.01" value="0.12" /></label>
              <label><span>baseline</span><input id="baselineInput" type="number" step="0.01" value="0" /></label>
              <label><span>motor</span><input id="motorInput" type="number" step="0.05" value="0" /></label>
            </div>
            <div class="send-grid">
              <button data-param="target" data-input="targetInput" type="button">发 target</button>
              <button data-param="kp" data-input="kpInput" type="button">发 kp</button>
              <button data-param="ki" data-input="kiInput" type="button">发 ki</button>
              <button data-param="kd" data-input="kdInput" type="button">发 kd</button>
              <button data-param="limit" data-input="limitInput" type="button">发 limit</button>
              <button data-param="min_cmd" data-input="minCmdInput" type="button">发 min</button>
              <button data-param="baseline" data-input="baselineInput" type="button">发 base</button>
              <button data-param="motor" data-input="motorInput" type="button">发 motor</button>
            </div>
          </section>

          <section class="panel">
            <div class="panel-head">
              <h2>命令</h2>
            </div>
            <form id="commandForm" class="command-form">
              <input id="commandInput" placeholder="kp=0.03 或 target=270" autocomplete="off" />
              <button class="primary-btn" type="submit">发送</button>
            </form>
            <pre id="log" class="log"></pre>
          </section>
        </aside>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
